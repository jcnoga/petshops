<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerShop - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-store"></i></div>
      <h1>PerShop <span>Enterprise</span></h1>
      <p>Gestão completa para petshops</p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    </form>

    <div class="login-footer">
      <a href="#" id="resetPasswordLink"><i class="fas fa-key"></i> Esqueceu a senha?</a>
    </div>
  </div>
  <div class="login-info">
    <p><i class="fas fa-shield-alt"></i> Ambiente seguro</p>
  </div>
</div>

<!-- Modal de recuperação de senha -->
<div id="resetModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Recuperar Senha</h3>
      <button class="modal-close" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body">
      <input type="email" id="resetEmail" placeholder="seu@email.com" class="reset-input">
      <button id="sendResetBtn" class="btn btn-primary btn-block">Enviar link</button>
    </div>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>

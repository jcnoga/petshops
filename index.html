<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerShop - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-store"></i></div>
      <h1>PerShop <span>Dashboard</span></h1>
    </div>
    <div class="empresa-info" id="empresaInfo">
      <i class="fas fa-building"></i> Carregando...
    </div>
    <div class="config-bar">
      <span class="badge"><i class="fas fa-fire"></i> Firebase Online</span>
      <button id="logoutBtn" class="btn btn-outline"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </div>

  <div id="trialAlert" class="trial-alert" style="display: none;"></div>

  <div class="stats-grid">
    <div class="stat-card" data-module="clientes.html">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-value" id="totalClientes">0</div>
      <div class="stat-label">Clientes</div>
    </div>
    <div class="stat-card" data-module="pets.html">
      <div class="stat-icon"><i class="fas fa-paw"></i></div>
      <div class="stat-value" id="totalPets">0</div>
      <div class="stat-label">Pets</div>
    </div>
    <div class="stat-card" data-module="financeiro.html">
      <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
      <div class="stat-value" id="faturamentoMes">R$ 0</div>
      <div class="stat-label">Faturamento (mês)</div>
    </div>
    <div class="stat-card" data-module="agendamentos.html">
      <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
      <div class="stat-value" id="agendamentosHoje">0</div>
      <div class="stat-label">Agendamentos Hoje</div>
    </div>
  </div>

  <div class="modules-grid">
    <a href="clientes.html" class="module-card"><i class="fas fa-user-friends"></i><span>Clientes</span></a>
    <a href="pets.html" class="module-card"><i class="fas fa-paw"></i><span>Pets</span></a>
    <a href="servicos.html" class="module-card"><i class="fas fa-cut"></i><span>Serviços</span></a>
    <a href="profissionais.html" class="module-card"><i class="fas fa-user-md"></i><span>Profissionais</span></a>
    <a href="produtos.html" class="module-card"><i class="fas fa-box"></i><span>Produtos</span></a>
    <a href="agendamentos.html" class="module-card"><i class="fas fa-calendar-check"></i><span>Agendamentos</span></a>
    <a href="vacinas.html" class="module-card"><i class="fas fa-syringe"></i><span>Vacinas</span></a>
    <a href="financeiro.html" class="module-card"><i class="fas fa-chart-line"></i><span>Financeiro</span></a>
    <a href="fornecedores.html" class="module-card"><i class="fas fa-truck"></i><span>Fornecedores</span></a>
    <a href="compras.html" class="module-card"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
    <a href="relatorios.html" class="module-card"><i class="fas fa-chart-pie"></i><span>Relatórios</span></a>
    <a href="configuracoes.html" class="module-card"><i class="fas fa-cog"></i><span>Configurações</span></a>
  </div>

  <div class="footer">PerShop Enterprise - Versão completa</div>
</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>

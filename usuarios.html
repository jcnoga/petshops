<script type="module">
    import { auth, db, onAuthStateChanged } from './firebase-config.js';
    import { collection, query, where, getDocs, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { createUserWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    import { 
        escapeHtml, showToast, validarEmail, validarTelefone, formatarData,
        carregarEmpresaUsuario, verificarAcessoAdmin, aplicarMascaraTelefone,
        verificarStatusEmpresa, verificarSuperAdmin, SUPER_ADMIN_EMAIL
    } from './util.js';

    let currentUser = null;
    let currentEmpresa = null;
    let isSuperAdmin = false;
    let editingId = null;
    let currentPage = 1;
    const itemsPerPage = 10;
    let usuariosCache = [];

    // ... (funções auxiliares)

    async function carregarUsuarios() {
        if (!currentEmpresa && !isSuperAdmin) return [];
        let q;
        if (isSuperAdmin) {
            q = collection(db, 'usuarios');
        } else {
            q = query(collection(db, 'usuarios'), where('empresaId', '==', currentEmpresa.id));
        }
        const snapshot = await getDocs(q);
        let usuarios = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        // Se NÃO for superadmin, remove o superusuário da lista
        if (!isSuperAdmin) {
            usuarios = usuarios.filter(u => u.email?.toLowerCase() !== SUPER_ADMIN_EMAIL.toLowerCase());
        }
        
        usuariosCache = usuarios;
        return usuariosCache;
    }

    // ... resto do código

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            isSuperAdmin = await verificarSuperAdmin(user);
            currentEmpresa = await carregarEmpresaUsuario(user);
            if (!currentEmpresa && !isSuperAdmin) {
                showToast('Nenhuma empresa associada.', 'error');
                window.location.href = 'empresa.html';
                return;
            }
            document.getElementById('empresaInfo').innerHTML = isSuperAdmin ? 
                '<i class="fas fa-globe"></i> Super Administrador' : 
                `<i class="fas fa-building"></i> ${currentEmpresa.emp_razao_social || currentEmpresa.emp_nome_fantasia || 'Empresa'}`;
            
            const isAdmin = await verificarAcessoAdmin(user);
            if (!isAdmin && !isSuperAdmin) {
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('blockedContent').classList.remove('hidden');
                document.getElementById('conteudoPrincipal').style.display = 'none';
                return;
            }
            
            await carregarUsuarios();
            renderUsuarios();
            updateStats();
            applyMasks();
            
            // alerta trial (apenas para não superadmin)
            if (!isSuperAdmin && currentEmpresa) {
                const statusInfo = verificarStatusEmpresa(currentEmpresa);
                const trialDiv = document.getElementById('trialAlert');
                // ... exibir alerta
            } else {
                document.getElementById('trialAlert').style.display = 'none';
            }
            
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('conteudoPrincipal').style.display = 'block';
        } else {
            window.location.href = 'login.html';
        }
    });
</script>
